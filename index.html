<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Utilitários</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Dashboard de Utilitários</h1>
    </header>

    <div class="container">

        <aside>
            <button data-section="conversor">Conversor de Moedas</button>
            <button data-section="imc">IMC</button>
            <button data-section="temperatura">Temperatura</button>
            <button data-section="velocidade">Velocidade</button>
            <button data-section="massa">Massa</button>
            <button data-section="regra-de-tres">Regra de Três</button>
        </aside>

        <main>

            <section id="conversor" class="pagina">

                <h2>Conversor de Moedas</h2>

                <label for="valorMoeda">Valor</label>
                <input type="number" id="valorMoeda">

                <label for="tipoConversao">Conversão</label>

                <select id="tipoConversao">
                    <option value="brl-usd">BRL → USD</option>
                    <option value="usd-brl">USD → BRL</option>
                </select>

                <button id="btnConverterMoeda">
                    Converter
                </button>

                <div id="resultadoMoeda"></div>

            </section>

            <section id="imc" class="pagina">

                <h2>Cálculo de IMC por Gênero</h2>

                <label for="peso">Peso (kg)</label>
                <input type="number" id="peso">

                <label for="altura">Altura (m)</label>
                <input type="number" step="0.01" id="altura">

                <p>Gênero:</p>

                <div class="genero">

                    <input
                        type="radio"
                        name="genero"
                        id="masculino"
                        value="masculino">

                    <label for="masculino">
                        Masculino
                    </label>

                    <input
                        type="radio"
                        name="genero"
                        id="feminino"
                        value="feminino">

                    <label for="feminino">
                        Feminino
                    </label>

                </div>

                <button id="calcularImc">
                    Calcular IMC
                </button>

                <div id="resultadoImc"></div>

            </section>

            <section id="temperatura" class = "pagina">
                <h2>Conversor de Temperatura</h2>
                <label>Valor</label>
                <input type="number" id = "valorTemperatura">
                <select id="tipoTemperatura">

                    <option value="c-f">
                        Celsius - Fahrenheitt
                    </option>

                    <option value="f-c">
                        Fahrenheitt - Celsius
                    </option>

                    <button id="btnTemperatura">Converter</button>

                    <div id ="resultadoTemperatura"></div>


                </select>




            </section>

           

    <script src="script.js"></script>

</body>

</html>
